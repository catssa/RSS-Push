name: BiliPush
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install rss-push
      - run: rss-push --rss "https://rsshub.app/bilibili/user/dynamic/11473291" --dingtalk-webhook "${{ secrets.DINGTALK_WEBHOOK }}" --dingtalk-keyword "B站"
